name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Build + Correctness Tests (Apple Silicon) ────────────────────────────────
  build-and-test:
    name: Build & Test (macOS 14, arm64)
    runs-on: macos-14       # GitHub's Apple Silicon runner (M1)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure (Release)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64

      - name: Build all targets
        run: cmake --build build --parallel $(sysctl -n hw.ncpu)

      - name: Run correctness tests
        run: ./build/correctness_tests

      - name: Run latency profiler (smoke — 20 samples)
        run: |
          # Quick sanity run to verify no crashes; full profiling is manual
          ./build/latency_profile --quick 2>/dev/null || ./build/latency_profile

      - name: Run speedup demo
        run: ./build/speedup_demo

  # ── AddressSanitizer build ───────────────────────────────────────────────────
  asan:
    name: AddressSanitizer (macOS 14)
    runs-on: macos-14
    # ASan catches heap buffer overflows, use-after-free, memory leaks
    # Critical for the slab pool & sharded mutex code paths

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure (ASan)
        run: |
          cmake -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address"

      - name: Build
        run: cmake --build build-asan --parallel $(sysctl -n hw.ncpu)

      - name: Run correctness tests under ASan
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
        run: ./build-asan/correctness_tests

  # ── ThreadSanitizer build ────────────────────────────────────────────────────
  tsan:
    name: ThreadSanitizer (macOS 14)
    runs-on: macos-14
    # TSan detects data races in the sharded slab pool and telemetry paths
    # Validates that atomic fast-path and shared_mutex are race-free

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Configure (TSan)
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build
        run: cmake --build build-tsan --parallel $(sysctl -n hw.ncpu)

      - name: Run correctness tests under TSan
        env:
          TSAN_OPTIONS: "halt_on_error=1:second_deadlock_stack=1"
        run: ./build-tsan/correctness_tests

  # ── Static analysis ──────────────────────────────────────────────────────────
  clang-tidy:
    name: clang-tidy Static Analysis
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake
        run: brew install cmake

      - name: Generate compile_commands.json
        run: |
          cmake -B build-tidy \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy on core sources
        run: |
          clang-tidy \
            -p build-tidy \
            --checks="-*,clang-analyzer-*,bugprone-*,performance-*,readability-*" \
            --warnings-as-errors="" \
            src/core/metal_device.cpp \
            src/matrix/matrix_ops.cpp \
            src/matrix/float16_matrix.cpp \
            src/metal_float16_accelerator.cpp \
            2>&1 | tee clang-tidy-report.txt || true

      - name: Upload clang-tidy report
        uses: actions/upload-artifact@v4
        with:
          name: clang-tidy-report
          path: clang-tidy-report.txt
